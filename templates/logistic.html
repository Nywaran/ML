{% extends 'layout.html' %}

{% block content %}
<section class="intro">
    <h2>Regresión Logística</h2>
    <p>Ingresa los datos del cliente para predecir si realizará una compra.</p>
</section>

<hr style="border: 0; border-top: 1px solid #333; margin: 2rem 0;">

<div class="form-container">
    <form action="/LogisticRegression/" method="POST">

        <div class="form-group">
            <label>Edad</label>
            <input type="number" name="edad" placeholder="Ej: 35" required>
        </div>

        <div class="form-group">
            <label>Ingreso mensual (COP)</label>
            <input type="number" name="ingreso_mensual" placeholder="Ej: 3500000" required>
        </div>

        <div class="form-group">
            <label>Visitas web por mes</label>
            <input type="number" name="visitas_web_mes" placeholder="Ej: 12" required>
        </div>

        <div class="form-group">
            <label>Tiempo en el sitio (minutos)</label>
            <input type="number" step="0.1" name="tiempo_sitio_min" placeholder="Ej: 15.5" required>
        </div>

        <div class="form-group">
            <label>Compras previas</label>
            <input type="number" name="compras_previas" placeholder="Ej: 3" required>
        </div>

        <div class="form-group">
            <label>¿Usó descuento? <span style="color:#666">(0 = No, 1 = Sí)</span></label>
            <input type="number" name="descuento_usado" placeholder="0 o 1" min="0" max="1" required>
        </div>

        <button type="submit">Predecir</button>
    </form>
</div>
{% endblock %}
